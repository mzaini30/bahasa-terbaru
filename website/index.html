<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Website Ujian Bahasa Arab dengan mode offline">
    <title>Ujian Bahasa Arab</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4285f4">
</head>
<body>
    <header>
        <h1>Ujian Bahasa Arab</h1>
    </header>
    
    <main>
        <div id="sentences-container">
            <!-- Kalimat akan ditampilkan di sini -->
        </div>
    </main>

    <button id="shuffle-button" aria-label="Acak Ulang">
        <span>🔄</span>
    </button>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        // Register service worker for offline functionality
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registered with scope:', registration.scope);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
